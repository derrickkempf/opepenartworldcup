<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Opepen Art World Cup — Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --board:#161616;
    --board-ink:#3a3a3a;
    --board-edge:rgba(255,255,255,.10);
    --grid-line:rgba(255,255,255,.075);
    --line:#eef2f4;
    --green:#2f9e4f; --green-dk:#0b3d22;
    --gold:#a7792b; --gold-lo:#8e6019; --gold-hi:#f3cf26; --gold-mid:#d6a83a;
    --ink:#e5e5e5; --muted:#6a6a6a; --muted2:#4d4d4d;
    --pad:clamp(10px,2.4vw,34px);
    --u:clamp(15px, calc((100vw - 2*var(--pad)) / 18), 62px);
    --disp:"Geist",system-ui,-apple-system,sans-serif;
    --mono:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px),
      radial-gradient(120% 80% at 50% -8%, #14140f 0%, var(--bg) 46%),
      var(--bg);
    background-size:var(--u) var(--u), var(--u) var(--u), auto, auto;
    background-origin:border-box;
    color:var(--ink); font-family:var(--disp);
    min-height:100dvh; padding:clamp(18px,3vw,40px) var(--pad) clamp(40px,6vw,80px);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; align-items:center; gap:0;
  }
  .wrap{width:calc(18*var(--u)); max-width:100%;}

  /* ---------- HEADER ---------- */
  header{text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:clamp(8px,1.4vw,16px);}
  .eyebrow{font-family:var(--mono); font-size:clamp(13px,1.1vw,18px); color:#333; font-weight:500; letter-spacing:.04em;}
  h1{margin:0; font-weight:700; line-height:.96; font-size:clamp(30px,5.1vw,68px);
     letter-spacing:-.045em; color:var(--gold); text-shadow:0 1px 0 rgba(0,0,0,.5);}
  h1 .sm{display:block; font-size:.86em;}
  .sub{max-width:48ch; margin:8px auto 0; color:#666; font-size:clamp(12px,1.05vw,15px);
       font-weight:500; line-height:1.45; letter-spacing:-.01em;}

  /* ---------- STAGE: one background grid, solid panels on top ---------- */
  .stage{position:relative; width:calc(18*var(--u)); margin:0 auto;
    display:grid; grid-template-columns:repeat(18,var(--u)); grid-auto-rows:var(--u);}

  .stadium{grid-column:1/19; grid-row:2/12; position:relative; z-index:1;
    display:grid; grid-template-columns:repeat(18,1fr); grid-template-rows:repeat(10,1fr);}

  /* distraction boards — solid bands with a consistent hairline frame on every side */
  .board{background:var(--bg); position:relative; z-index:2; overflow:hidden; display:flex; align-items:center;
    border:1px solid var(--board-edge);}
  .board.t{grid-column:1/19; grid-row:1/2;}
  .board.b{grid-column:1/19; grid-row:10/11;}
  .board.l{grid-column:1/2; grid-row:2/10; justify-content:center; border-top:0; border-bottom:0;}
  .board.r{grid-column:18/19; grid-row:2/10; justify-content:center; border-top:0; border-bottom:0;}
  .ticker{white-space:nowrap; font-family:var(--mono); font-weight:400;
    font-size:calc(var(--u)*.205); letter-spacing:.34em; color:var(--board-ink); will-change:transform;}
  .board.t .ticker{animation:mar 38s linear infinite;}
  .board.b .ticker{animation:mar 44s linear infinite reverse;}
  .vstrip{writing-mode:vertical-rl; white-space:nowrap; font-family:var(--mono);
    font-size:calc(var(--u)*.205); letter-spacing:.34em; color:var(--board-ink);}
  .board.l .vstrip{transform:rotate(180deg); animation:marV 30s linear infinite;}
  .board.r .vstrip{animation:marV 34s linear infinite reverse;}
  @keyframes mar{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes marV{from{transform:translateY(0)}to{transform:translateY(-50%)}}

  /* pitch (16x8) — opaque art with a clean white outline on all four sides */
  .pitch{grid-column:2/18; grid-row:2/10; position:relative; z-index:3;
    display:grid; grid-template-columns:repeat(16,1fr); grid-template-rows:repeat(8,1fr);}
  .half{position:relative; display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);}
  .half.home{grid-column:1/9; grid-row:1/9;}
  .half.away{grid-column:9/17; grid-row:1/9;}
  .cell{width:100%; height:100%;}

  .markings{position:absolute; inset:0; width:100%; height:100%; overflow:visible; z-index:4; pointer-events:none;
    box-sizing:border-box; border:1px solid var(--line);}
  .markings *{vector-effect:non-scaling-stroke;}

  .picks{position:absolute; inset:0; z-index:5; display:grid; grid-template-columns:1fr 1fr;}
  .pick{border:0; background:transparent; cursor:pointer; position:relative; padding:0; -webkit-tap-highlight-color:transparent;}
  .pick .glow{position:absolute; inset:0; opacity:0; transition:opacity .25s var(--ease);
    box-shadow:inset 0 0 0 calc(var(--u)*.06) var(--gold-hi);
    background:#00000050;}
  .pick:hover .glow{opacity:.85;}
  .pick:focus-visible{outline:none;}
  .pick:focus-visible .glow{opacity:.85;}
  .pick.win .glow{opacity:1; box-shadow:inset 0 0 0 calc(var(--u)*.085) var(--gold-hi); background:transparent;}
  .pick.lose .glow{opacity:1; box-shadow:none; background:#00000050;}
  .pick.lose{filter:grayscale(.85) brightness(.5);}

  /* ---------- SCOREBOARD ---------- */
  .scoreband{grid-column:6/14; grid-row:12/12; position:relative; z-index:2; overflow:visible;
    background:var(--board); border:1px solid #242424;
    display:grid; grid-template-columns:1fr auto auto auto 1fr; align-items:center;}
  .scoreband .sidebg{position:absolute; top:0; bottom:0; width:50%; z-index:0; background:transparent; transition:background .35s var(--ease);}
  .scoreband .sidebg.h{left:0;} .scoreband .sidebg.a{right:0;}
  .scoreband.won-h .sidebg.h{background:var(--green);}
  .scoreband.won-a .sidebg.a{background:var(--green);}
  .scoreband > :not(.sidebg){position:relative; z-index:1;}
  .scoreband .lab{color:var(--muted2); font-weight:600; letter-spacing:-.03em; font-size:calc(var(--u)*.42); transition:color .3s;}
  .scoreband .lab.h{grid-column:1; justify-self:start; padding-left:calc(var(--u)*.7);}
  .scoreband .lab.a{grid-column:5; justify-self:end; padding-right:calc(var(--u)*.7);}
  .scoreband .num{font-weight:800; font-size:calc(var(--u)*.9); line-height:1; color:#fff;
    font-variant-numeric:tabular-nums; transition:color .2s;}
  .scoreband .num.h{grid-column:2; justify-self:end; padding-right:calc(var(--u)*.5);}
  .scoreband .num.a{grid-column:4; justify-self:start; padding-left:calc(var(--u)*.5);}
  .scoreband.won-h .lab.h, .scoreband.won-a .lab.a{color:var(--green-dk);}
  .scoreband .trophy{grid-column:3; justify-self:center; align-self:center;
    height:var(--u); width:auto; display:block;
    filter:drop-shadow(0 calc(var(--u)*.04) calc(var(--u)*.08) rgba(0,0,0,.5));}

  .makepick{grid-column:1/19; grid-row:15/16; position:relative; z-index:2;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); color:var(--muted2); letter-spacing:.34em; font-size:clamp(10px,.92vw,13px);}

  /* ---------- MATCH STATS (revealed after a pick) ---------- */
  .matchstats{width:calc(8*var(--u)); margin:0 auto; background:var(--board);
    border:1px solid #242424; border-top:0; display:none; flex-direction:column;
    padding:clamp(16px,1.8vw,26px) clamp(18px,2.2vw,34px) clamp(14px,1.6vw,22px);
    gap:clamp(12px,1.4vw,20px);}
  .matchstats.show{display:flex;}
  .statshead{display:flex; align-items:baseline; justify-content:space-between;
    font-family:var(--mono); letter-spacing:.22em; font-size:11px; color:#5a5a5a; margin-bottom:2px;}
  .srow{display:grid; grid-template-columns:48px 1fr 48px; align-items:center; gap:10px; margin:20px 0;}
  .sv{font-family:var(--mono); font-size:clamp(12px,1vw,15px); color:#d8d8d8;}
  .sv.h{text-align:right;} .sv.a{text-align:left;}
  .sbar{position:relative; height:16px; display:flex; align-items:center;}
  .track{position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:3px; display:flex;}
  .seg{height:3px; background:#4c4c4c;}
  .seg.win{background:#f4f4f4;}
  .node{position:absolute; top:50%; width:6px; height:6px; border-radius:50%; background:#0a0a0a;
    box-shadow:0 0 0 2px #f4f4f4; transform:translate(-50%,-50%);}
  .slabel{position:absolute; left:0; right:0; text-align:center; font-family:var(--mono);
    font-size:clamp(9px,.82vw,11.5px); letter-spacing:.16em; color:#7f7f7f; pointer-events:none; margin-top:20px;}
  .nextrow{display:flex; justify-content:flex-end; margin-top:4px;}
  .nextbtn{font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:#0a0a0a; background:var(--gold-hi); border:0; border-radius:4px; padding:.7em 1.3em; cursor:pointer;
    transition:.16s; font-weight:500;}
  .nextbtn:hover{background:#fff;}
  .nextbtn:focus-visible{outline:2px solid #fff; outline-offset:2px;}

  /* ---------- CONTROL DECK ---------- */
  .deck{width:calc(18*var(--u)); position:relative; overflow:hidden;
    border:1px solid #242424;
    background:var(--board);
    padding:clamp(14px,1.8vw,24px); display:flex; flex-direction:column; gap:14px;}
  .deckrow{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; position:relative;}
  .round{font-family:var(--mono); letter-spacing:.2em; font-size:clamp(11px,1vw,14px); color:var(--gold-mid);}
  .round b{color:var(--gold-hi); font-weight:500;}
  .counter{font-family:var(--mono); font-size:clamp(11px,1vw,14px); color:var(--muted); letter-spacing:.08em;}
  .progress{position:relative; height:5px; border-radius:3px; background:#221f16; overflow:hidden;}
  .progress i{position:absolute; inset:0 auto 0 0; width:0;
    background:linear-gradient(90deg,var(--gold-lo),var(--gold-hi)); transition:width .45s var(--ease);}
  .bars{display:flex; gap:3px; flex-wrap:wrap; max-width:60%;}
  .bars span{width:11px; height:11px; border:1px solid #000; border-radius:2px; background:#000000;}
  .bars span.done{background:var(--gold); border-color:var(--gold);}
  .bars span.cur{background:#666666;}
  .btn{font-family:var(--mono); font-size:12px; letter-spacing:.12em; color:#cdb573;
    background:transparent; border:1px solid #3a3322; border-radius:4px; padding:.6em 1.1em; cursor:pointer;
    transition:.18s; text-transform:uppercase;}
  .btn:hover{border-color:var(--gold); color:var(--gold-hi); background:rgba(167,121,43,.08);}
  .btn:focus-visible{outline:2px solid var(--gold-hi); outline-offset:2px;}
  .hint{font-family:var(--mono); font-size:11px; color:#4a4636; letter-spacing:.06em;}

  .champ{display:none; flex-direction:column; align-items:center; gap:14px; text-align:center; padding:8px 0;}
  .champ.show{display:flex;}
  .champ .crest{width:calc(var(--u)*4); height:calc(var(--u)*4); display:grid;
    grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
    box-shadow:0 12px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(243,207,38,.25);}
  .champ .crest .cell{width:100%;height:100%}
  .champ .kicker{font-family:var(--mono); letter-spacing:.4em; color:var(--gold-mid); font-size:12px;}
  .champ .who{font-weight:800; letter-spacing:-.04em; font-size:clamp(26px,4vw,46px); color:var(--gold-hi);}
  .champ .meta{font-family:var(--mono); color:#7a7468; font-size:12px; letter-spacing:.1em;}

  @media (max-width:560px){ .scoreband .lab{font-size:calc(var(--u)*.5)} .bars{max-width:100%} .srow{grid-template-columns:42px 1fr 42px; gap:10px} }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>
  <header class="wrap">
    <div class="eyebrow">2026</div>
    <h1>Opepen Art World Cup</h1>
    <p class="sub">A 40-team single-elimination tournament decided on instinct. Trust your gut, or risk missing completely.</p>
  </header>

  <div class="stage" id="stage" role="group" aria-label="Match pitch and scoreboard">
    <div class="stadium" id="stadium">
      <div class="board t"><div class="ticker" id="tk-t"></div></div>
      <div class="board b"><div class="ticker" id="tk-b"></div></div>
      <div class="board l"><div class="vstrip" id="tk-l"></div></div>
      <div class="board r"><div class="vstrip" id="tk-r"></div></div>

      <div class="pitch">
        <div class="half home" id="half-h"></div>
        <div class="half away" id="half-a"></div>

        <svg class="markings" viewBox="0 0 16 8" preserveAspectRatio="none" aria-hidden="true">
          <g fill="none" stroke="var(--line)" stroke-width="1" stroke-opacity=".92">
            <line x1="8" y1="0" x2="8" y2="8"/>
            <circle cx="8" cy="4" r="2"/>
            <path d="M0,2 H2 V6 H0"/>
            <path d="M0,3 H-1 V5 H0"/>
            <path d="M2,3 A1 1 0 0 1 2,5"/>
            <path d="M16,2 H14 V6 H16"/>
            <path d="M16,3 H17 V5 H16"/>
            <path d="M14,3 A1 1 0 0 0 14,5"/>
          </g>
        </svg>

        <div class="picks">
          <button class="pick home" id="pick-h" aria-label="Pick the home side">
            <span class="glow"></span>
          </button>
          <button class="pick away" id="pick-a" aria-label="Pick the away side">
            <span class="glow"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="scoreband" id="scoreband">
      <div class="sidebg h"></div><div class="sidebg a"></div>
      <span class="lab h">Home</span>
      <span class="num h" id="num-h">0</span>
      <svg class="trophy" viewBox="0 0 60.98 121.89" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="#b18336" d="M52.02,52.02l-21.51,21.51v17.89h30.47V30.51h-.04c0,7.79-2.98,15.57-8.92,21.51l.04.04-.04-.04h0Z"/><rect fill="#014127" x="30.51" y="91.42" width="30.47" height="30.47"/><path fill="#9b6c2c" d="M30.51,73.57v-.04l-.04.04-21.55-21.55c-1.32-1.32-2.48-2.72-3.51-4.2-.13-.18-.25-.37-.38-.56-.12-.18-.23-.36-.35-.54-.39-.61-.75-1.23-1.08-1.86-.12-.21-.23-.43-.34-.65-.89-1.77-1.61-3.61-2.13-5.49-.62-2.21-.99-4.48-1.1-6.76v59.44h30.47v-17.85Z"/><rect fill="#2b5b48" x=".04" y="91.42" width="30.47" height="30.47"/><path fill="#e3ca86" d="M52.06,8.96s-.02-.03-.04-.04h0c-11.9-11.9-31.19-11.9-43.09,0l21.58,21.58,21.55-21.55Z"/><polygon fill="#a7792b" points="30.51 30.51 30.43 30.51 8.92 52.02 30.47 73.57 30.51 73.53 52.02 52.02 52.02 52.02 52.02 52.02 30.51 30.51 30.51 30.51"/><path fill="#8e6019" d="M1.13,38.73c.53,1.88,1.24,3.72,2.13,5.49.11.22.22.43.34.65.34.63.7,1.25,1.08,1.86.11.18.23.36.35.54.12.19.25.37.38.56,1.03,1.48,2.19,2.88,3.51,4.2l21.51-21.51h.07S8.92,8.93,8.92,8.93h0C2.59,15.26-.37,23.68.04,31.97H.04c.11,2.28.48,4.55,1.1,6.76Z"/><path fill="#8e6019" d="M5.41,47.82c-.13-.18-.25-.37-.38-.56.12.19.25.37.38.56Z"/><path fill="#8e6019" d="M4.69,46.72c-.39-.61-.75-1.23-1.08-1.86.34.63.7,1.25,1.08,1.86Z"/><path fill="#8e6019" d="M3.27,44.22c-.89-1.77-1.61-3.61-2.13-5.49.53,1.88,1.24,3.72,2.13,5.49Z"/><path fill="#8e6019" d="M.04,31.97H.04c.11,2.28.48,4.55,1.1,6.76-.62-2.21-.99-4.48-1.1-6.76Z"/><path fill="#472808" d="M30.51,30.51l21.51,21.51c5.94-5.94,8.92-13.72,8.92-21.51,0-7.79-2.95-15.59-8.89-21.55l-21.55,21.55h0Z"/></svg>
      <span class="num a" id="num-a">0</span>
      <span class="lab a">Away</span>
    </div>
    <div class="makepick" id="makepick">MAKE YOUR PICK</div>
  </div>

  <div class="matchstats" id="matchstats">
    <div class="statshead"><span>MATCH STATS</span><span id="stathead-r">#41 vs #42</span></div>
    <div id="statlist"></div>
    <div class="nextrow"><button class="nextbtn" id="nextbtn">Next match →</button></div>
  </div>

  <div class="deck wrap">
    <div class="deckview" id="deckview">
      <div class="deckrow">
        <div class="round" id="roundlbl">Round of 40 · <b id="matchno">Match 01 / 20</b></div>
        <div class="counter" id="seedlbl">#41 vs #42</div>
      </div>
      <div class="progress"><i id="bar"></i></div>
      <div class="deckrow">
        <div class="bars" id="dots"></div>
        <div style="display:flex;gap:10px;align-items:center">
          <span class="hint">← / → to pick · U undo</span>
          <button class="btn" id="undo">Undo</button>
          <button class="btn" id="reset">Reset</button>
        </div>
      </div>
    </div>
    <div class="champ" id="champ">
      <div class="kicker">CHAMPION</div>
      <div class="crest" id="crest"></div>
      <div class="who" id="champname">—</div>
      <div class="meta" id="champmeta"></div>
      <button class="btn" id="reset2">Run it back</button>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
/* ============================================================
   BACKEND CONFIG — paste your Firebase web config below.
   (Firebase console → Project settings → General → Your apps → Web app)
   These values are safe to ship publicly; writes are guarded by
   Firestore security rules (see firestore.rules). Leave blank to run
   in offline/demo mode with seeded numbers.
   ============================================================ */
const OWC_CONFIG = {
  firebase: {
    apiKey: "",
    authDomain: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
  }
};
let db=null, ONLINE=false;
try{
  if(OWC_CONFIG.firebase.projectId && window.firebase){
    firebase.initializeApp(OWC_CONFIG.firebase);
    db = firebase.firestore();
    ONLINE = true;
  }

function layout(teams){ const n=teams.length;
  if(n<2) return {matches:[], byes:teams.slice()};
  if(n===5) return {matches:[[teams[3],teams[4]]], byes:[teams[0],teams[1],teams[2]]};

function rng(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

const keyOf=(a,b)=>{ const x=teamId(a),y=teamId(b); return Math.min(x,y)+'-'+Math.max(x,y); };

function talliesFor(a,b){            // -> [homeVotes(left=a), awayVotes(right=b)]
  const k=keyOf(a,b), lo=Math.min(teamId(a),teamId(b)), t=TALLY[k];
  if(t){ const hv=(teamId(a)===lo)?t.a:t.b, av=(teamId(b)===lo)?t.a:t.b; return [hv,av]; }
  if(!ONLINE){ return crowd(a,b); }

  const sx=r.left+window.scrollX, sy=r.top+window.scrollY;
  const ox=((sx%u)+u)%u, oy=((sy%u)+u)%u;
  document.body.style.backgroundPosition = ox+'px '+oy+'px, '+ox+'px '+oy+'px, 0 0, 0 0';
}

const buildDots=()=>{ dots.innerHTML=''; for(let i=0;i<TOTAL;i++) dots.appendChild(document.createElement('span')); };
function syncDots(){ let w=0; for(let r=0;r<ROUNDS.length;r++){ const L=layout(ROUNDS[r]); for(let m=0;m<L.matches.length;m++){ const [a,b]=L.matches[m], el=dots.children[w]; if(el){ el.className=''; if(VOTED.has(keyOf(a,b))) el.classList.add('done'); if(view&&r===view.r&&m===view.m) el.classList.add('cur'); } w++; } } }

const animTok=new WeakMap();
function countUp(el,to){ const from=parseInt(el.textContent)||0; const tok=(animTok.get(el)||0)+1; animTok.set(el,tok); const t0=performance.now();
  (function step(now){ if(animTok.get(el)!==tok) return; const p=Math.min(1,(now-t0)/420);
    el.textContent=Math.round(from+(to-from)*(1-Math.pow(1-p,3))); if(p<1)requestAnimationFrame(step); })(performance.now()); }

function renderStats(a,b){
  const rows=matchStats(a,b); statlist.innerHTML='';
  $('stathead-r').textContent='#'+teamId(a)+' vs #'+teamId(b);
  for(const row of rows){
    const hn=row.hn!=null?row.hn:row.h, an=row.an!=null?row.an:row.a, tot=(hn+an)||1;
    let lw=Math.round(hn/tot*100); lw=Math.max(7,Math.min(93,lw)); const hWin=hn>=an;
    const el=document.createElement('div'); el.className='srow';
    el.innerHTML='<span class="sv h">'+row.h+'</span>'+
      '<div class="sbar"><div class="track"><i class="seg h '+(hWin?'win':'')+'" style="width:'+lw+'%"></i>'+
      '<i class="seg a '+(hWin?'':'win')+'" style="width:'+(100-lw)+'%"></i></div>'+
      '<span class="slabel">'+row.label+'</span></div>'+
      '<span class="sv a">'+row.a+'</span>';
    statlist.appendChild(el);
  }
}

function render(){
  if(!view) return showChamp();
  $('champ').classList.remove('show'); $('deckview').style.display=''; $('stage').style.display='';
  const [a,b]=matchPairAt(view.r,view.m);
  const pit=pitchForMatch(a,b);
  paint(cellsH, compose('home',a,pit)); paint(cellsA, compose('away',b,pit));
  seedlbl.textContent='#'+teamId(a)+'  vs  #'+teamId(b);
  roundlbl.innerHTML=ROUND_NAMES[Math.min(view.r,5)]+' · <b>Match '+String(view.m+1).padStart(2,'0')+' / '+String(matchesInRound(view.r)).padStart(2,'0')+'</b>';
  const [hv,av]=talliesFor(a,b); countUp(numH,hv); countUp(numA,av);
  const picked=pickedSideOf(a,b);
  pickH.classList.toggle('win',picked==='h'); pickH.classList.toggle('lose',picked==='a');
  pickA.classList.toggle('win',picked==='a'); pickA.classList.toggle('lose',picked==='h');
  scoreband.classList.toggle('won-h',picked==='h'); scoreband.classList.toggle('won-a',picked==='a');
  if(picked){ makepick.style.display='none'; renderStats(a,b); matchstats.classList.add('show'); }
  else { makepick.style.display=''; makepick.textContent='MAKE YOUR PICK'; matchstats.classList.remove('show'); }
  bar.style.width=(playedCount()/TOTAL*100)+'%'; syncDots(); anchorGrid();
}

function showChamp(){
  const c=ROUNDS[ROUNDS.length-1][0];
  $('stage').style.display='none'; matchstats.classList.remove('show'); $('deckview').style.display='none';
  $('champ').classList.add('show'); const crest=$('crest'); crest.innerHTML='';
  const cols=compose('home',c,pitchForMatch(c,c)); for(let i=0;i<64;i++){ const d=document.createElement('div'); d.className='cell'; d.style.background=cols[i]; crest.appendChild(d); }
  $('champname').textContent='Team '+teamId(c);
  $('champmeta').textContent = ONLINE ? 'LIVE LEADER · UPDATES AS THE COMMUNITY VOTES' : 'WINNER · OPEPEN ART WORLD CUP 2026';
  bar.style.width='100%';
}

/* ---------- voting (writes to the shared tally) ---------- */
function vote(side){
  if(busy||!view) return;
  const [a,b]=matchPairAt(view.r,view.m), k=keyOf(a,b);
  if(VOTED.has(k)) return;
  const lo=Math.min(teamId(a),teamId(b)), chosenId=side==='h'?teamId(a):teamId(b), s=(chosenId===lo)?'a':'b';
  if(!TALLY[k]) TALLY[k] = ONLINE ? {a:0,b:0} : baseFromCrowd(a,b);
  TALLY[k][s]=(TALLY[k][s]||0)+1;
  VOTED.set(k,s); saveVoted();
  ROUNDS=buildRounds(); render();
  if(ONLINE){ db.collection('matchups').doc(k).set({team_a:lo, team_b:Math.max(teamId(a),teamId(b)), [s]:INC(1)},{merge:true}).catch(()=>{}); }
}
function next(){ view=firstUnvoted(); render(); }
function undo(){
  if(busy||!view) return;
  const [a,b]=matchPairAt(view.r,view.m), k=keyOf(a,b);
  if(!VOTED.has(k)) return;
  const s=VOTED.get(k); if(TALLY[k]) TALLY[k][s]=Math.max(0,(TALLY[k][s]||1)-1);
  VOTED.delete(k); saveVoted(); ROUNDS=buildRounds(); render();
  if(ONLINE){ db.collection('matchups').doc(k).set({[s]:INC(-1)},{merge:true}).catch(()=>{}); }
}
function reset(){            // retracts only THIS device's votes
  if(busy) return;
  for(const [k,s] of [...VOTED.entries()]){
    if(TALLY[k]) TALLY[k][s]=Math.max(0,(TALLY[k][s]||1)-1);
    if(ONLINE) db.collection('matchups').doc(k).set({[s]:INC(-1)},{merge:true}).catch(()=>{});
  }
  VOTED.clear(); saveVoted(); ROUNDS=buildRounds(); view=firstUnvoted(); render();
}

pickH.addEventListener('click',()=>vote('h'));
pickA.addEventListener('click',()=>vote('a'));
$('nextbtn').addEventListener('click',next);
$('undo').addEventListener('click',undo);
$('reset').addEventListener('click',reset);
$('reset2').addEventListener('click',reset);
document.addEventListener('keydown',e=>{
  if(!view) return;
  const [a,b]=matchPairAt(view.r,view.m), locked=VOTED.has(keyOf(a,b));
  if(locked){ if(e.key==='Enter'||e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();} else if(e.key==='u'||e.key==='U'){undo();} return; }
  if(e.key==='ArrowLeft'){e.preventDefault();vote('h');}
  else if(e.key==='ArrowRight'){e.preventDefault();vote('a');}
  else if(e.key==='u'||e.key==='U'){undo();}
});

/* ---------- boot + realtime ---------- */
buildDots();
ROUNDS=buildRounds(); view=firstUnvoted();
if(ONLINE){
  db.collection('matchups').onSnapshot(snap=>{
    snap.forEach(d=>{ const x=d.data()||{}; TALLY[d.id]={a:x.a||0,b:x.b||0}; });
    ROUNDS=buildRounds();
    if(view && view.r>=ROUNDS.length) view=firstUnvoted();
    render();
  }, ()=>render());
}
render();
window.addEventListener('resize', anchorGrid);
window.addEventListener('load', anchorGrid);
if(document.fonts && document.fonts.ready) document.fonts.ready.then(anchorGrid);
anchorGrid();

/* ---------- background-grid "crowd flashes" (hover + ambient) ---------- */
(function gridFX(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const canHover = matchMedia('(hover: hover)').matches;
  const cv=document.createElement('canvas');
  cv.style.cssText='position:fixed; inset:0; z-index:-1; pointer-events:none;';
  document.body.appendChild(cv);
  const ctx=cv.getContext('2d');
  let W=0,H=0,dpr=1;
  function resize(){ dpr=Math.min(2,window.devicePixelRatio||1); W=innerWidth; H=innerHeight;
    cv.width=Math.floor(W*dpr); cv.height=Math.floor(H*dpr); cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0); }
  resize(); addEventListener('resize',resize);

  let lastG={u:60,ox:0,oy:0};
  function grid(){ const r=stageEl.getBoundingClientRect(); if(r.width){ const u=r.width/18;
      lastG={u, ox:((r.left%u)+u)%u, oy:((r.top%u)+u)%u}; } return lastG; }

  let flashes=[];
  function spawn(c,r,dur,peak,warm){ flashes.push({c,r,t0:performance.now(),dur,peak,warm}); if(flashes.length>300) flashes.splice(0,flashes.length-300); }
  const startT=performance.now(), INTRO=2400;          // opening burst window
  function ambient(){
    const g=grid();
    const e=performance.now()-startT, boost=e<INTRO ? 1-e/INTRO : 0;   // 1 -> 0 across the opening, then 0
    const n=2+Math.floor(Math.random()*6)+Math.round(boost*16);        // dense at first, settles to 2..7
    for(let i=0;i<n;i++){
      const c=Math.floor((Math.random()*(W+g.u)-g.ox)/g.u);
      const r=Math.floor((Math.random()*(H+g.u)-g.oy)/g.u);
      spawn(c,r, 650+Math.random()*800, 0.08+Math.random()*0.12+boost*0.06, Math.random()<0.18+boost*0.12);
    }
    const delay=80+Math.random()*180 + (1-boost)*(540+Math.random()*1400);  // rapid opening -> normal cadence
    setTimeout(ambient, delay);
  }
  ambient();

  if(canHover){ let lc=null,lr=null;
    addEventListener('mousemove',e=>{ const g=grid();
      const c=Math.floor((e.clientX-g.ox)/g.u), r=Math.floor((e.clientY-g.oy)/g.u);
      if(c!==lc||r!==lr){ lc=c; lr=r; spawn(c,r, 520, 0.22, false); } });
  }

  function frame(now){
    ctx.clearRect(0,0,W,H); const g=grid();
    flashes=flashes.filter(f=>now-f.t0 < f.dur);
    for(const f of flashes){ const p=(now-f.t0)/f.dur, a=Math.sin(p*Math.PI)*f.peak; if(a<=0) continue;
      ctx.fillStyle = f.warm ? 'rgba(243,207,38,'+a+')' : 'rgba(255,255,255,'+a+')';
      ctx.fillRect(g.ox+f.c*g.u+1, g.oy+f.r*g.u+1, g.u-2, g.u-2);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
